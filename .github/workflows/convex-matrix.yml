name: Convex Matrix

on:
  push:
    branches:
      - changeset-release/main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  convex-matrix:
    name: Convex Matrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 📥 Monorepo install
        uses: ./.github/actions/bun-install
        with:
          generate: "true"

      - name: 📦 Build Packages
        run: bun build:pkg

      - name: 🧪 Run full Convex matrix
        run: bun run scenario:check:convex

      - name: 🧪 Run runtime scenarios
        run: bun run test:runtime
