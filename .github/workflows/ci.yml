name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default:
    name: CI
    runs-on: ubuntu-latest
    if: >-
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.title != '[Release] Version packages'
      ) && (
        github.event_name != 'push' ||
        !contains(github.event.head_commit.message, '[skip ci]')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 📥 Monorepo install
        uses: ./.github/actions/bun-install
        with:
          generate: "true"

      - name: ♻️ Setup Next.js cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/www/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: 🧠 Validate Skills
        run: bun run intent:validate

      - name: 📦 Build Packages
        run: bun build:pkg

      - name: 🔬 Run PR gate
        run: bun run check:ci
