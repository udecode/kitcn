name: Notify Intent

on:
  push:
    branches: [main]
    paths:
      - "www/content/docs/**"
      - "packages/kitcn/src/**"
      - "packages/kitcn/skills/**"
      - ".github/workflows/notify-playbooks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    name: Notify TanStack Intent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        name: Use Node.js
        with:
          node-version: 22

      - name: Collect changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Dispatch to intent repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INTENT_NOTIFY_TOKEN }}
          repository: TanStack/intent
          event-type: skill-check
          client-payload: |
            {
              "package": "kitcn",
              "sha": "${{ github.sha }}",
              "changed_files": ${{ steps.changes.outputs.files }}
            }
